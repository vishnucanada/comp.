services:
  comp:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ALLOWED_ORIGINS=http://localhost:8000
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./policies:/app/policies
      - ./audit:/app/audit
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
